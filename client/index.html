<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Cloud Storage</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div id="auth-section">
      <div id="login-form" class="form-container">
        <h2>Login with Email</h2>
        <p>Access your account using your email address and password.</p>
        <form id="login">
          <input type="email" id="login-email" placeholder="Email address" required>
          <input type="password" id="login-password" placeholder="Password" required>
          <div class="password-toggle">
            <label><input type="checkbox" id="login-show-password"> Show password</label>
          </div>
          <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="#" id="show-register">Register</a></p>
      </div>
      <div id="register-form" class="form-container hidden">
        <h2>Register with Email</h2>
        <p>Create an account using your email address and a secure password.</p>
        <form id="register">
          <input type="text" id="register-username" placeholder="Username" required>
          <input type="email" id="register-email" placeholder="Email address (@gmail.com)" required>
          <input type="password" id="register-password" placeholder="Password (min 6 chars)" required>
          <div class="password-toggle">
            <label><input type="checkbox" id="register-show-password"> Show password</label>
          </div>
          <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="#" id="show-login">Login</a></p>
      </div>
    </div>
    <div id="dashboard" class="hidden">
      <header>
        <h1>Personal Cloud Storage</h1>
        <div class="header-controls">
          <button id="dark-mode-toggle">🌙</button>
          <button id="logout">Logout</button>
        </div>
      </header>
      <div class="dashboard-content">
        <div class="upload-section">
          <input type="file" id="file-input" multiple>
          <button id="upload-btn">Upload Files</button>
          <div id="upload-progress" class="hidden">
            <progress id="progress-bar" value="0" max="100"></progress>
            <span id="progress-text">0%</span>
          </div>
        </div>
        <div class="search-section">
          <input type="text" id="search-input" placeholder="Search files...">
          <select id="filter-select">
            <option value="all">All Types</option>
            <option value="images">Images</option>
            <option value="videos">Videos</option>
            <option value="documents">Documents</option>
            <option value="others">Others</option>
          </select>
          <select id="sort-select">
            <option value="date-desc">Newest First</option>
            <option value="date-asc">Oldest First</option>
            <option value="size-desc">Largest First</option>
            <option value="size-asc">Smallest First</option>
          </select>
        </div>
        <div id="files-list"></div>
      </div>
    </div>
  </div>
  <div id="notification" class="hidden"></div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
